<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0A0E27;--card:#141832;--card2:#1C2145;
--gold:#FFD700;--gold2:#FF8C00;--green:#00D68F;--green2:#00A651;
--red:#FF4757;--orange:#FF6B35;--blue:#4B7BEC;
--wh:#FFFFFF;--t1:#E8ECF4;--t2:#8892B0;--t3:#5A6380;
--mtn:#FFCC00;--air:#FF0000;--glo:#50C878;
--ease:cubic-bezier(.4,0,.2,1)
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--bg);color:var(--wh)}

/* === APP CONTAINER === */
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* === TOP BAR === */
.topbar{background:var(--card);padding:10px 16px;flex-shrink:0;z-index:10;border-bottom:1px solid rgba(255,255,255,.05)}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.step-txt{font-size:12px;color:var(--t2)}
.step-txt b{color:var(--gold);font-size:14px}
.prog-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:3px;transition:width .5s var(--ease);width:0%}

/* === MAIN CONTENT === */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch}

/* === SCREENS === */
.screen{position:absolute;top:0;left:0;right:0;min-height:100%;padding:20px 16px 100px;transition:all .45s var(--ease);opacity:1;transform:translateX(0)}
.screen.out-left{transform:translateX(-100%);opacity:0;pointer-events:none}
.screen.out-right{transform:translateX(100%);opacity:0;pointer-events:none}
.screen.hidden{display:none}

/* === WELCOME SCREEN === */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:calc(100vh - 60px);padding-top:0!important}
.w-icon{font-size:72px;margin-bottom:16px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.w-nine{font-size:96px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:4px}
.w-title{font-size:24px;font-weight:800;margin-bottom:6px;line-height:1.2}
.w-sub{font-size:14px;color:var(--t2);margin-bottom:28px;max-width:300px}
.w-carrier-label{font-size:12px;color:var(--t3);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.w-carriers{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.w-car{padding:10px 20px;border-radius:25px;border:2px solid rgba(255,255,255,.12);background:transparent;color:var(--t2);font-size:14px;font-weight:700;cursor:pointer;transition:.3s}
.w-car:hover,.w-car.on{transform:scale(1.05)}
.w-car[data-c="mtn"]{border-color:rgba(255,204,0,.3);color:var(--mtn)}
.w-car[data-c="mtn"].on{background:var(--mtn);color:var(--bg);border-color:var(--mtn)}
.w-car[data-c="airtel"]{border-color:rgba(255,0,0,.3);color:var(--air)}
.w-car[data-c="airtel"].on{background:var(--air);color:#fff;border-color:var(--air)}
.w-car[data-c="glo"]{border-color:rgba(80,200,120,.3);color:var(--glo)}
.w-car[data-c="glo"].on{background:var(--glo);color:#fff;border-color:var(--glo)}
.w-car[data-c="all"]{border-color:rgba(255,255,255,.2);color:var(--t1)}
.w-car[data-c="all"].on{background:var(--blue);color:#fff;border-color:var(--blue)}
.w-start{width:100%;max-width:300px;padding:16px;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;border-radius:16px;color:var(--bg);font-size:18px;font-weight:800;cursor:pointer;transition:.3s;text-transform:uppercase;letter-spacing:1px}
.w-start:hover{transform:scale(1.03);box-shadow:0 6px 30px rgba(255,215,0,.3)}
.w-start:active{transform:scale(.98)}
.w-stats{display:flex;gap:24px;margin-top:24px}
.w-stat-n{font-size:18px;font-weight:800;color:var(--gold)}
.w-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}

/* === OFFER SCREEN === */
.offer-screen{display:flex;flex-direction:column}
.o-header{text-align:center;margin-bottom:16px}
.o-step{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:4px}
.o-carrier-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:12px}
.badge-mtn{background:rgba(255,204,0,.15);color:var(--mtn);border:1px solid rgba(255,204,0,.2)}
.badge-air{background:rgba(255,0,0,.12);color:var(--air);border:1px solid rgba(255,0,0,.15)}
.badge-glo{background:rgba(80,200,120,.12);color:var(--glo);border:1px solid rgba(80,200,120,.2)}

.o-card{background:var(--card);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.o-visual{height:140px;display:flex;align-items:center;justify-content:center;position:relative}
.o-emoji{font-size:64px;position:relative;z-index:2;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.o-visual::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--card))}
.o-badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:8px;font-size:10px;font-weight:800;z-index:3;text-transform:uppercase;letter-spacing:.5px}
.o-badge.hot{background:var(--orange);color:#fff}
.o-badge.top{background:var(--gold);color:var(--bg)}
.o-badge.new{background:var(--green);color:#fff}

.o-body{padding:18px 20px 20px}
.o-name{font-size:22px;font-weight:900;margin-bottom:2px;line-height:1.2}
.o-subname{font-size:14px;color:var(--gold);font-weight:600;margin-bottom:8px}
.o-cats{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.o-cat{font-size:10px;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--t2)}
.o-desc{font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:12px}
.o-meta{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.o-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.o-meta-icon{font-size:14px}
.o-meta-val{font-weight:700;color:var(--gold)}

.o-social{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);margin-bottom:16px;background:rgba(255,255,255,.03);padding:8px 12px;border-radius:10px}
.o-social .pulse{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

/* === CTA BUTTONS === */
.cta-area{padding:0 16px;margin-top:auto}
.btn-play{display:block;width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;border-radius:16px;color:var(--bg);font-size:17px;font-weight:800;cursor:pointer;transition:.3s;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;position:relative;overflow:hidden}
.btn-play::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transition:.5s}
.btn-play:hover::before{left:100%}
.btn-play:active{transform:scale(.97)}
.btn-play.played{background:var(--green);color:#fff;pointer-events:none}

.btn-skip{display:block;width:100%;padding:13px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:14px;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;transition:.3s}
.btn-skip:hover{border-color:rgba(255,255,255,.2);color:var(--t2)}
.btn-skip:active{transform:scale(.97)}

.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-sm{flex:1;padding:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:var(--t3);font-size:12px;cursor:pointer;transition:.3s;text-align:center}
.btn-sm:hover{background:rgba(255,255,255,.08);color:var(--t1)}

/* Auto-advance bar */
.auto-advance{margin-top:12px;text-align:center}
.aa-txt{font-size:11px;color:var(--t3);margin-bottom:6px}
.aa-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.aa-fill{height:100%;background:var(--green);border-radius:2px;width:0%;transition:width linear}

/* === SHARE GATE === */
.share-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:calc(100vh - 60px);padding-top:0!important}
.sg-emoji{font-size:56px;margin-bottom:14px}
.sg-title{font-size:22px;font-weight:800;margin-bottom:6px}
.sg-sub{font-size:13px;color:var(--t2);margin-bottom:24px;max-width:300px;line-height:1.5}
.sg-count{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:20px}
.sg-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;margin-bottom:20px}
.sg-btn{padding:13px 20px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.3s;color:#fff}
.sg-btn:hover{transform:scale(1.03)}
.sg-btn.wa{background:#25D366}.sg-btn.fb{background:#1877F2}.sg-btn.cp{background:var(--t3)}
.sg-skip{background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;padding:10px;margin-top:8px}
.sg-skip:hover{color:var(--t2)}

/* === COMPLETE SCREEN === */
.complete-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:calc(100vh - 60px);padding-top:0!important}
.cmp-emoji{font-size:72px;margin-bottom:14px;animation:bounce 1.5s infinite}
.cmp-title{font-size:26px;font-weight:900;margin-bottom:6px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cmp-sub{font-size:14px;color:var(--t2);margin-bottom:24px}
.cmp-stats{display:flex;gap:20px;margin-bottom:24px}
.cmp-stat{background:var(--card);padding:16px 20px;border-radius:14px;min-width:90px;border:1px solid rgba(255,255,255,.05)}
.cmp-stat-n{font-size:28px;font-weight:900}
.cmp-stat-n.played{color:var(--green)}
.cmp-stat-n.skipped{color:var(--orange)}
.cmp-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;margin-top:2px}
.cmp-share-title{font-size:13px;color:var(--t2);margin-bottom:12px}
.cmp-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;margin-bottom:16px}
.cmp-btn{padding:14px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff;transition:.3s}
.cmp-btn:hover{transform:scale(1.03)}
.cmp-btn.wa{background:#25D366}.cmp-btn.fb{background:#1877F2}
.cmp-btn.qr{background:var(--gold);color:var(--bg)}
.cmp-restart{background:none;border:1px solid rgba(255,255,255,.1);color:var(--t2);padding:12px;border-radius:14px;width:100%;max-width:300px;font-size:13px;cursor:pointer;margin-top:8px;transition:.3s}
.cmp-restart:hover{border-color:var(--gold);color:var(--gold)}
.cmp-qr-box{margin-top:16px;background:#fff;padding:14px;border-radius:12px;display:none}
.cmp-qr-box.show{display:inline-block}
.cmp-qr-box img{width:160px;height:160px}

/* === CONFETTI === */
.confetti-wrap{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;top:-10px;opacity:0}
.confetti.go{animation:fall 3s ease-in forwards}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(.5)}}

/* === QR MODAL === */
.modal-ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-ov.on{display:flex}
.modal{background:var(--card);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center;border:1px solid rgba(255,255,255,.08)}
.modal h3{font-size:16px;margin-bottom:4px}
.modal p{font-size:12px;color:var(--t3);margin-bottom:16px}
.modal .qr-box{background:#fff;padding:14px;border-radius:10px;display:inline-block;margin-bottom:14px}
.modal .qr-box img{width:160px;height:160px}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer}
.modal .m-btns{display:flex;justify-content:center;gap:10px;margin-top:12px}
.modal .m-btn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:none;color:#fff;transition:.3s}
.modal .m-btn:hover{transform:scale(1.1)}

/* === TOAST === */
.toast{position:fixed;bottom:20px;left:16px;right:16px;max-width:380px;margin:0 auto;background:var(--card2);border:1px solid rgba(255,215,0,.15);border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:50;transform:translateY(100px);opacity:0;transition:.4s var(--ease)}
.toast.show{transform:translateY(0);opacity:1}
.toast-icon{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gold));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.toast-msg{font-size:11px;color:var(--t2);line-height:1.3}
.toast-msg strong{color:var(--gold)}
.toast-time{font-size:9px;color:var(--t3);margin-top:2px}

/* === COPY TOAST === */
.cp-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--green);color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:700;z-index:300;transition:.3s var(--ease)}
.cp-toast.show{transform:translateX(-50%) translateY(0)}

/* Gradients for offer visuals */
.vg1{background:linear-gradient(135deg,#667eea,#764ba2)}

.vg4{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.vg5{background:linear-gradient(135deg,#fa709a,#fee140)}
.vg6{background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
.vg7{background:linear-gradient(135deg,#89f7fe,#66a6ff)}
.vg8{background:linear-gradient(135deg,#fddb92,#d1fdff)}
.vg9{background:linear-gradient(135deg,#ff9a9e,#fecfef)}

/* Responsive */
@media(min-width:480px){
    #app{border-left:1px solid rgba(255,255,255,.05);border-right:1px solid rgba(255,255,255,.05)}
}
</style>

// =============================================
// BUILD FLOW
// =============================================
function buildFlow(carrier) {
    // Sort offers by carrier priority then payout
    let sorted = [];
    const carrierPriority = {
        'all': ['mtn','airtel','glo'],
        'mtn': ['mtn','airtel','glo'],
        'airtel': ['airtel','mtn','glo'],
        'glo': ['glo','mtn','airtel']
    };
    const pri = carrierPriority[carrier] || carrierPriority['all'];

    if (carrier === 'all') {
        // Alternate carriers, highest payout first within each
        const byCarrier = {};
        ALL_OFFERS.forEach((o,i) => {
            if (!byCarrier[o.carrier]) byCarrier[o.carrier] = [];
            byCarrier[o.carrier].push(i);
        });
        // Sort each carrier group by payout desc
        Object.values(byCarrier).forEach(arr => arr.sort((a,b) => ALL_OFFERS[b].payout - ALL_OFFERS[a].payout));
        
        // Round-robin
        let round = 0;
        while (sorted.length < ALL_OFFERS.length) {
            for (const c of pri) {
                if (byCarrier[c] && byCarrier[c][round] !== undefined) {
                    sorted.push(byCarrier[c][round]);
                }
            }
            round++;
        }
    } else {
        // Carrier-specific first, then others
        const mine = [];
        const others = [];
        ALL_OFFERS.forEach((o,i) => {
            if (o.carrier === carrier) mine.push(i);
            else others.push(i);
        });
        mine.sort((a,b) => ALL_OFFERS[b].payout - ALL_OFFERS[a].payout);
        others.sort((a,b) => ALL_OFFERS[b].payout - ALL_OFFERS[a].payout);
        sorted = [...mine, ...others];
    }

    offerOrder = sorted;

    // Build flow sequence
    flow = [
        { type:'welcome' },
        { type:'offer', offerIdx:0 },
        { type:'offer', offerIdx:1 },
        { type:'offer', offerIdx:2 },
        { type:'share', num:1 },
        { type:'offer', offerIdx:3 },
        { type:'offer', offerIdx:4 },
        { type:'offer', offerIdx:5 },
        { type:'share', num:2 },
        { type:'offer', offerIdx:6 },
        { type:'offer', offerIdx:7 },
        { type:'offer', offerIdx:8 },
        { type:'complete' }
    ];
}

}

// =============================================
// NAVIGATION
// =============================================
function updateTopBar(flowIndex) {
    const step = flow[flowIndex];
    const progEl = document.getElementById('progFill');
    const stepEl = document.getElementById('stepTxt');

    if (step.type === 'welcome') {
        progEl.style.width = '0%';
        stepEl.innerHTML = 'Welcome';
    } else if (step.type === 'complete') {
        progEl.style.width = '100%';
        stepEl.innerHTML = '<b>9/9</b> Complete! 🎉';
    } else if (step.type === 'share') {
        const offersSeen = played.size + skipped.size;
        const pct = (offersSeen / 9) * 100;
        progEl.style.width = pct + '%';
        stepEl.innerHTML = `<b>${offersSeen}/9</b> Share & Continue`;
    } else {
        const num = getOfferNumber(flowIndex);
        const pct = (num / 9) * 100;
        progEl.style.width = pct + '%';
        stepEl.innerHTML = `Game <b>${num}/9</b>`;
    }
}

function renderScreen(flowIndex) {
    const step = flow[flowIndex];
    let html = '';
    if (step.type === 'welcome') html = renderWelcome();
    else if (step.type === 'offer') html = renderOffer(flowIndex);
    else if (step.type === 'share') html = renderShareGate(flowIndex);
    else if (step.type === 'complete') html = renderComplete();
    return html;
}

function advanceTo(nextFlowIndex) {
    if (autoAdvanceTimer) {
        clearInterval(autoAdvanceTimer);
        autoAdvanceTimer = null;
    }

    const currentScreen = document.getElementById(`screen-${currentFlowIndex}`) 
        || document.getElementById('screen-welcome')
        || document.getElementById('screen-complete');
    
    // Add next screen HTML
    const nextHTML = renderScreen(nextFlowIndex);
    mainWrap.insertAdjacentHTML('beforeend', nextHTML);
    
    const nextScreen = document.getElementById(
        flow[nextFlowIndex].type === 'welcome' ? 'screen-welcome' :
        flow[nextFlowIndex].type === 'complete' ? 'screen-complete' :
        `screen-${nextFlowIndex}`
    );

    // Animate out current
    if (currentScreen) {
        currentScreen.classList.add('out-left');
    }

    // Animate in next
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            if (nextScreen) {
                nextScreen.classList.remove('out-right');
            }
        });
    });

    // Remove old screen after animation
    setTimeout(() => {
        if (currentScreen && currentScreen !== nextScreen) {
            currentScreen.remove();
        }
    }, 500);

    currentFlowIndex = nextFlowIndex;
    updateTopBar(nextFlowIndex);

    // Scroll main to top
    mainWrap.scrollTop = 0;

    // Confetti on complete
    if (flow[nextFlowIndex].type === 'complete') {
        launchConfetti();
    }
}

// =============================================
// USER ACTIONS
// =============================================
function selectCarrier(carrier) {
    selectedCarrier = carrier;
    document.querySelectorAll('.w-car').forEach(b => b.classList.remove('on'));
    document.querySelector(`.w-car[data-c="${carrier}"]`).classList.add('on');
}

function startJourney() {
    buildFlow(selectedCarrier);
    advanceTo(1);
}

function playOffer(flowIndex, offerIdx) {
    const offer = ALL_OFFERS[offerIdx];
    window.open(offer.url, '_blank');
    played.add(offerIdx);
    
    // Update button
    const btn = document.getElementById(`playBtn-${flowIndex}`);
    if (btn) {
        btn.textContent = '✅ PLAYED!';
        btn.classList.add('played');
    }

    // Show auto-advance
    const aaWrap = document.getElementById(`aa-${flowIndex}`);
    const aaTxt = document.getElementById(`aaTxt-${flowIndex}`);
    const aaFill = document.getElementById(`aaFill-${flowIndex}`);
    if (aaWrap) aaWrap.style.display = 'block';

    let countdown = 3;
    if (aaTxt) aaTxt.textContent = `Next game in ${countdown}...`;
    if (aaFill) {
        aaFill.style.transition = 'none';
        aaFill.style.width = '0%';
        requestAnimationFrame(() => {
            aaFill.style.transition = 'width 3s linear';
            aaFill.style.width = '100%';
        });
    }

    autoAdvanceTimer = setInterval(() => {
        countdown--;
        if (aaTxt) aaTxt.textContent = countdown > 0 ? `Next game in ${countdown}...` : 'Loading next game...';
        if (countdown <= 0) {
            clearInterval(autoAdvanceTimer);
            autoAdvanceTimer = null;
            goNext(flowIndex);
        }
    }, 1000);
}

function skipOffer(flowIndex, offerIdx) {
    skipped.add(offerIdx);
    goNext(flowIndex);
}

function goNext(currentIdx) {
    if (currentIdx + 1 < flow.length) {
        advanceTo(currentIdx + 1);
    }
}

function restartJourney() {
    played.clear();
    skipped.clear();
    currentFlowIndex = 0;
    mainWrap.innerHTML = '';
    buildFlow(selectedCarrier);
    // Render welcome directly (no animation)
    mainWrap.innerHTML = renderWelcome();
    updateTopBar(0);
}

function copyLink(url) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url);
    } else {
        const ta = document.createElement('textarea');
        ta.value = url;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }
    const t = document.getElementById('cpToast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

}
